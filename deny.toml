# cargo-deny configuration — supply-chain policy.
# Run locally with: cargo deny check
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use the default advisory database; fail on any unmaintained/vulnerable crate.
version = 2
yanked = "deny"
ignore = [
    # number_prefix (RUSTSEC-2025-0119) is unmaintained; transitive via indicatif.
    # No safe upgrade is available as of 2026-06-30. Tracked as known accepted risk.
    { id = "RUSTSEC-2025-0119", reason = "Transitive via indicatif; no safe upgrade available as of initial policy creation." },
]

[licenses]
version = 2
# Licenses we accept across the dependency tree (project itself is MIT OR Apache-2.0).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
