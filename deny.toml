# cargo-deny configuration — supply-chain policy.
# Run locally with: cargo deny check
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use the default advisory database; fail on any unmaintained/vulnerable crate.
version = 2
yanked = "deny"

[licenses]
version = 2
# Licenses we accept across the dependency tree (project itself is MIT OR Apache-2.0).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # Mozilla CA-certificate bundle shipped by webpki-roots (via ureq → rustls),
    # used by `josephine update` for HTTPS to the GitHub Releases API.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
