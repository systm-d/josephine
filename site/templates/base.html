<!DOCTYPE html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{{ config.description }}" />
    <meta name="theme-color" content="#0b0e19" />
    <link rel="stylesheet" href="{{ get_url(path='main.css') }}" />
  </head>
  <body>
    <canvas id="sky" aria-hidden="true"></canvas>
    <div class="halo" aria-hidden="true"></div>
    {% block content %}{% endblock content %}
    <footer>
      100% local <span class="sep">·</span> Linux <span class="sep">·</span> open source
      <span class="sep">·</span> <a href="{{ config.extra.repo_url }}">GitHub</a>
    </footer>
    <script>
      (function () {
        var canvas = document.getElementById("sky");
        if (!canvas) return;
        var ctx = canvas.getContext("2d");
        var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var stars = [], w, h, dpr;
        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          w = canvas.clientWidth = window.innerWidth;
          h = canvas.clientHeight = window.innerHeight;
          canvas.width = w * dpr; canvas.height = h * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          var count = Math.round((w * h) / 9000);
          stars = [];
          for (var i = 0; i < count; i++) {
            stars.push({
              x: Math.random() * w, y: Math.random() * h,
              r: Math.random() * 1.1 + 0.25, a: Math.random() * 0.5 + 0.2,
              tw: Math.random() * 0.02 + 0.004, ph: Math.random() * Math.PI * 2
            });
          }
        }
        function draw(t) {
          ctx.clearRect(0, 0, w, h);
          for (var i = 0; i < stars.length; i++) {
            var s = stars[i];
            var tw = reduce ? s.a : s.a + Math.sin(t * s.tw + s.ph) * 0.18;
            ctx.globalAlpha = Math.max(0, Math.min(1, tw));
            ctx.fillStyle = i % 11 === 0 ? "#b3a3ec" : "#e9eaf6";
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
          }
          ctx.globalAlpha = 1;
          if (!reduce) requestAnimationFrame(draw);
        }
        window.addEventListener("resize", resize, { passive: true });
        resize();
        requestAnimationFrame(draw);
      })();
    </script>
  </body>
</html>
