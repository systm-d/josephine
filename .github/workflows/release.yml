name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  artifacts:
    name: build artifacts (linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked -p josephine
      - name: Stage tarball + checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIST="josephine-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "$DIST"
          cp target/release/josephine README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "$DIST"/
          cp -r packaging "$DIST"/
          tar czf "$DIST.tar.gz" "$DIST"
          sha256sum "$DIST.tar.gz" | tee "$DIST.tar.gz.sha256"
      - name: Build .deb and .rpm
        run: |
          cargo install cargo-deb cargo-generate-rpm
          cargo deb -p josephine --no-build
          cargo generate-rpm -p crates/josephine
      - name: Checksum .deb and .rpm
        run: |
          for pkg in target/debian/*.deb target/generate-rpm/*.rpm; do
            ( cd "$(dirname "$pkg")" && sha256sum "$(basename "$pkg")" | tee "$(basename "$pkg").sha256" )
          done
      - name: Render AUR PKGBUILD
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SRC_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          # The source archive exists as soon as the tag is pushed; its checksum
          # is stable, so the recipe builds from source reproducibly.
          curl -fsSL "$SRC_URL" -o source.tar.gz
          SRC_SHA="$(sha256sum source.tar.gz | cut -d' ' -f1)"
          # AUR PKGBUILD (same source tarball as the Homebrew tap, so same checksum)
          sed \
            -e "s|^pkgver=.*|pkgver=${VERSION}|" \
            -e "s|^sha256sums=('[0-9a-f]*')|sha256sums=('${SRC_SHA}')|" \
            -e "/# Fill with the real checksum/d" \
            -e "/# release tarball's sha256/d" \
            packaging/aur/PKGBUILD > PKGBUILD
          echo "Rendered PKGBUILD for ${TAG} (sha256 ${SRC_SHA}):"
          cat PKGBUILD
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            josephine-*-x86_64-unknown-linux-gnu.tar.gz
            josephine-*-x86_64-unknown-linux-gnu.tar.gz.sha256
            target/debian/*.deb
            target/debian/*.deb.sha256
            target/generate-rpm/*.rpm
            target/generate-rpm/*.rpm.sha256
            PKGBUILD

  homebrew-tap:
    name: refresh Homebrew tap formula
    needs: [artifacts]
    runs-on: ubuntu-24.04
    steps:
      # Check out the default branch (the tag was cut in detached HEAD): the tap
      # serves Formula/josephine.rb from the branch head, so it must be updated
      # there for `brew tap systm-d/josephine … && brew install josephine`.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Point Formula/josephine.rb at the new tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          SRC_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "$SRC_URL" -o source.tar.gz
          SRC_SHA="$(sha256sum source.tar.gz | cut -d' ' -f1)"
          rm -f source.tar.gz
          sed -i \
            -e "s|^  url \".*\"|  url \"${SRC_URL}\"|" \
            -e "s|^  sha256 \".*\"|  sha256 \"${SRC_SHA}\"|" \
            Formula/josephine.rb
          echo "Formula now targets ${TAG} (sha256 ${SRC_SHA}):"
          cat Formula/josephine.rb
      - name: Commit and push if the formula changed
        run: |
          if git diff --quiet -- Formula/josephine.rb; then
            echo "Formula already current for ${GITHUB_REF_NAME}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/josephine.rb
          git commit -m "release: refresh Homebrew tap formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

  crates-io:
    name: publish to crates.io
    needs: [artifacts]
    # Opt-in: set the repository variable PUBLISH_CRATES=true (and the
    # CARGO_REGISTRY_TOKEN secret) to enable crates.io publishing on a tag.
    if: ${{ vars.PUBLISH_CRATES == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish josephine-core then josephine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p josephine-core --locked
          cargo publish -p josephine --locked
