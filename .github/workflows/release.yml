name: Release

# Release Linux : construit le binaire, le tarball, les paquets .deb et .rpm,
# rend la formule Homebrew (tap) et le PKGBUILD AUR, puis agrÃĻge le tout dans
# une release GitHub. JosÃĐphine est Linux-native (systemd, /sys, /proc,
# libnotify) â pas de binaires macOS/Windows.
#
# DÃĐclenchÃĐ par un tag `v*.*.*` (crÃĐe la release + met Ã  jour le tap) ou
# manuellement via workflow_dispatch (build + artefacts uniquement).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Binaire natif Linux (x86_64) : tarball + sa somme sha256.
  # ---------------------------------------------------------------------------
  binaries:
    name: Binaire linux-x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --locked -p josephine
      - name: Empaqueter le tarball + sha256
        run: |
          staging="josephine-linux-x86_64"
          mkdir "$staging"
          cp target/release/josephine README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "$staging/"
          cp -r packaging "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          sha256sum "$staging.tar.gz" | tee "$staging.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: josephine-linux-x86_64
          path: |
            josephine-linux-x86_64.tar.gz
            josephine-linux-x86_64.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Paquet Debian / Ubuntu (.deb) + sha256 (companion attendu par `josephine
  # update` pour vÃĐrifier l'intÃĐgritÃĐ).
  # ---------------------------------------------------------------------------
  debian:
    name: Paquet Debian (.deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --locked -p josephine
      - name: Construire le .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p josephine --no-build
      - name: Somme sha256
        run: |
          for pkg in target/debian/*.deb; do
            ( cd "$(dirname "$pkg")" && sha256sum "$(basename "$pkg")" | tee "$(basename "$pkg").sha256" )
          done
      - uses: actions/upload-artifact@v4
        with:
          name: josephine-deb
          path: |
            target/debian/*.deb
            target/debian/*.deb.sha256

  # ---------------------------------------------------------------------------
  # Paquet Fedora / RHEL (.rpm) + sha256.
  # ---------------------------------------------------------------------------
  fedora:
    name: Paquet Fedora (.rpm)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --locked -p josephine
      - name: Construire le .rpm
        run: |
          cargo install cargo-generate-rpm --locked
          cargo generate-rpm -p crates/josephine
      - name: Somme sha256
        run: |
          for pkg in target/generate-rpm/*.rpm; do
            ( cd "$(dirname "$pkg")" && sha256sum "$(basename "$pkg")" | tee "$(basename "$pkg").sha256" )
          done
      - uses: actions/upload-artifact@v4
        with:
          name: josephine-rpm
          path: |
            target/generate-rpm/*.rpm
            target/generate-rpm/*.rpm.sha256

  # ---------------------------------------------------------------------------
  # Release GitHub (uniquement sur tag) : agrÃĻge tous les artefacts et rend la
  # formule Homebrew + le PKGBUILD AUR Ã  partir des gabarits packaging/. Les
  # deux recettes bÃĒtissent depuis la mÃŠme archive source, donc mÃŠme sha256.
  # Gabarit absent (tag antÃĐrieur Ã  son ajout) : on saute ce rendu sans faire
  # ÃĐchouer la release (binaires/deb/rpm restent publiÃĐs).
  # ---------------------------------------------------------------------------
  release:
    name: Publier la release
    needs: [binaries, debian, fedora]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - name: TÃĐlÃĐcharger les artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rendre la formule Homebrew et le PKGBUILD AUR
        env:
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          url="https://github.com/${GH_REPO}/archive/refs/tags/${TAG}.tar.gz"
          sha=$(curl -fsSL "$url" | sha256sum | cut -d' ' -f1)

          if [ -f packaging/homebrew/josephine.rb ]; then
            sed \
              -e "s|url \".*\"|url \"${url}\"|" \
              -e "s|sha256 \"[0-9a-f]*\"|sha256 \"${sha}\"|" \
              -e "/# Placeholder: release.yml/d" \
              packaging/homebrew/josephine.rb > josephine.rb
            echo "Rendu josephine.rb pour ${TAG} (sha256 ${sha}) :"
            cat josephine.rb
          else
            echo "packaging/homebrew/josephine.rb absent â formule Homebrew ignorÃĐe."
          fi

          if [ -f packaging/aur/PKGBUILD ]; then
            sed \
              -e "s|^pkgver=.*|pkgver=${version}|" \
              -e "s|^sha256sums=('[0-9a-f]*')|sha256sums=('${sha}')|" \
              -e "/# Fill with the real checksum/d" \
              -e "/# release tarball's sha256/d" \
              packaging/aur/PKGBUILD > PKGBUILD
            echo "Rendu PKGBUILD pour ${TAG} (sha256 ${sha}) :"
            cat PKGBUILD
          else
            echo "packaging/aur/PKGBUILD absent â PKGBUILD AUR ignorÃĐ."
          fi
      - name: Publier la release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            josephine.rb
            PKGBUILD

  # ---------------------------------------------------------------------------
  # Homebrew tap : rend Formula/josephine.rb sur la branche par dÃĐfaut Ã  partir
  # du gabarit packaging/homebrew/josephine.rb (source de vÃĐritÃĐ unique, mÃŠme
  # sed que le rendu de l'asset ci-dessus). Installation utilisateur :
  #   brew tap systm-d/josephine https://github.com/systm-d/josephine
  #   brew install josephine
  # ---------------------------------------------------------------------------
  homebrew:
    name: Mettre Ã  jour la formule Homebrew (tap)
    needs: release
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      # La branche par dÃĐfaut (le tag est en HEAD dÃĐtachÃĐ) : le tap sert
      # Formula/josephine.rb depuis la tÃŠte de branche, il faut l'y mettre Ã  jour.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - name: Rendre et committer la formule
        env:
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ ! -f packaging/homebrew/josephine.rb ]; then
            echo "packaging/homebrew/josephine.rb absent sur la branche par dÃĐfaut â ÃĐtape ignorÃĐe."
            exit 0
          fi
          version="${TAG#v}"
          url="https://github.com/${GH_REPO}/archive/refs/tags/${TAG}.tar.gz"
          sha=$(curl -fsSL "$url" | sha256sum | cut -d' ' -f1)
          mkdir -p Formula
          sed \
            -e "s|url \".*\"|url \"${url}\"|" \
            -e "s|sha256 \"[0-9a-f]*\"|sha256 \"${sha}\"|" \
            -e "/# Placeholder: release.yml/d" \
            packaging/homebrew/josephine.rb > Formula/josephine.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/josephine.rb
          git commit -m "homebrew: josephine ${version}" || { echo "Formule dÃĐjÃ  Ã  jour"; exit 0; }
          git push

  # ---------------------------------------------------------------------------
  # crates.io : publication opt-in. ActivÃĐe en rÃĐglant la variable de dÃĐpÃīt
  # PUBLISH_CRATES=true et le secret CARGO_REGISTRY_TOKEN ; sinon ce job est
  # ignorÃĐ. josephine-core est publiÃĐ avant josephine (dÃĐpendance de chemin).
  # ---------------------------------------------------------------------------
  crates-io:
    name: Publier sur crates.io
    needs: [binaries]
    if: ${{ vars.PUBLISH_CRATES == 'true' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publier josephine-core puis josephine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p josephine-core --locked
          cargo publish -p josephine --locked
